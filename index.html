    async function hashPassword(password, salt) {
      const data = new TextEncoder().encode(password + salt);
      const hash = await crypto.subtle.digest('SHA-256', data);
      return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
    }
    function generateSalt() {
      return Array.from(crypto.getRandomValues(new Uint8Array(16))).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    const Storage = {
      getUsers: () => JSON.parse(localStorage.getItem('pnft_users') || '[]'),
      saveUser: async (user) => {
        const users = Storage.getUsers();
        if (users.find(u => u.email === user.email)) { alert('Correo ya registrado'); return false; }
        const salt = generateSalt();
        const hashed = await hashPassword(user.password, salt);
        users.push({...user, password: hashed, salt});
        localStorage.setItem('pnft_users', JSON.stringify(users));
        return true;
      },
      findUser: async (email, pass) => {
        const users = Storage.getUsers();
        const user = users.find(u => u.email === email);
        if (!user) return null;
        const hashedInput = await hashPassword(pass, user.salt);
        return hashedInput === user.password ? user : null;
      },
      setSession: (user) => localStorage.setItem('pnft_session', JSON.stringify(user)),
      clearSession: () => localStorage.removeItem('pnft_session'),
      saveItem: (key, data) => {
        const arr = JSON.parse(localStorage.getItem(key) || '[]');
        arr.push({...data, fecha: new Date().toISOString()});
        localStorage.setItem(key, JSON.stringify(arr));
      },
      getItems: (key) => JSON.parse(localStorage.getItem(key) || '[]')
    };

    if (currentUser) {
      const exists = Storage.getUsers().find(u => u.email === currentUser.email);
      if (!exists) { currentUser = null; Storage.clearSession(); }
    }

    function obtenerCiclo(nivel) { if (nivel === '0°') return 'Preescolar'; const g = parseInt(nivel); if (g <= 3) return 'I Ciclo'; if (g <= 6) return 'II Ciclo'; return 'III Ciclo'; }
    function obtenerSaberesDetallados(ids) {
      const detalles = []; const nivelData = DATA[selectedNivel]; if (!nivelData) return ''; const moduloData = nivelData[selectedModulo]; if (!moduloData) return '';
      for (let area in moduloData) { moduloData[area].saberes.forEach(s => { if (ids.includes(s.id)) detalles.push(`- ${s.nombre}: ${s.indicadores.join(' ')}`); }); }
      return detalles.join('\n');
    }
    function sugerirMetodologia(nivel) { if (nivel === '0°') return 'ABJ'; const g = parseInt(nivel); if (g <= 3) return 'ABJ'; if (g <= 6) return 'ABR'; return 'Design Thinking'; }

    // Autenticación
    function renderAuth() { /* ... igual que antes ... */ }
    window.login = async () => { /* ... */ };
    window.logout = () => { /* ... */ };
    window.showRegister = async () => { /* ... */ };

    // Navegación
    function loadPage(page) { /* ... */ }

    // Progreso
    function getProgressKey() { return currentUser ? `pnft_progreso_${currentUser.email}` : 'pnft_progreso_anon'; }
    function guardarProgreso() { if (!currentUser) return; localStorage.setItem(getProgressKey(), JSON.stringify({ nivel: selectedNivel, modulo: selectedModulo, saberes: Array.from(saberesSeleccionados) })); }
    async function cargarProgreso() { if (!currentUser) return; const data = JSON.parse(localStorage.getItem(getProgressKey()) || 'null'); if (!data) return; selectedNivel = data.nivel || selectedNivel; selectedModulo = data.modulo || selectedModulo; saberesSeleccionados = new Set(data.saberes || []); }

    // Currículo
    function renderCurriculo(container) { /* ... */ }
    function actualizarModulos() { /* ... */ }
    function cargarSaberes() { /* ... (versión con data-area y sin texto extra) ... */ }
    window.toggleSaber = (id) => { saberesSeleccionados.has(id) ? saberesSeleccionados.delete(id) : saberesSeleccionados.add(id); guardarProgreso(); cargarSaberes(); };
    window.seleccionarArea = (area) => { const data = DATA[selectedNivel]?.[selectedModulo] || {}; if (!data[area]) return; data[area].saberes.forEach(s => saberesSeleccionados.add(s.id)); guardarProgreso(); cargarSaberes(); };
    window.seleccionarTodosSaberes = () => { const data = DATA[selectedNivel]?.[selectedModulo] || {}; const filtro = document.getElementById('areaFiltro')?.value || 'todas'; for (let area in data) { if (filtro !== 'todas' && filtro !== area) continue; data[area].saberes.forEach(s => saberesSeleccionados.add(s.id)); } guardarProgreso(); cargarSaberes(); };
    window.limpiarSeleccion = () => { saberesSeleccionados.clear(); guardarProgreso(); cargarSaberes(); };

    // IA
    function renderIA(container) { /* ... (versión con botones y editor editable) ... */ }
    function generarPrompt() { /* ... */ }
    // ... resto de funciones de IA, Dashboard, Evaluación, Historial ...

    // Inicio
    (async () => { await cargarProgreso(); renderAuth(); loadPage('curriculo'); })();
  </script>
