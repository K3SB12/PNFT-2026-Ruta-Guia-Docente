    // ---------- SEGURIDAD: HASH CON SALT POR USUARIO ----------
    async function hashPassword(password, salt) {
      const data = new TextEncoder().encode(password + salt);
      const hash = await crypto.subtle.digest('SHA-256', data);
      return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
    }
    function generateSalt() {
      return Array.from(crypto.getRandomValues(new Uint8Array(16))).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // ---------- ALMACENAMIENTO ----------
    const Storage = {
      getUsers: () => JSON.parse(localStorage.getItem('pnft_users') || '[]'),
      saveUser: async (user) => {
        const users = Storage.getUsers();
        if (users.find(u => u.email === user.email)) {
          alert('Este correo ya está registrado.');
          return false;
        }
        const salt = generateSalt();
        const hashed = await hashPassword(user.password, salt);
        users.push({...user, password: hashed, salt});
        localStorage.setItem('pnft_users', JSON.stringify(users));
        return true;
      },
      findUser: async (email, pass) => {
        const users = Storage.getUsers();
        const user = users.find(u => u.email === email);
        if (!user) return null;
        const hashedInput = await hashPassword(pass, user.salt);
        return hashedInput === user.password ? user : null;
      },
      setSession: (user) => localStorage.setItem('pnft_session', JSON.stringify(user)),
      clearSession: () => localStorage.removeItem('pnft_session'),
      saveItem: (key, data) => {
        const arr = JSON.parse(localStorage.getItem(key) || '[]');
        arr.push({...data, fecha: new Date().toISOString()});
        localStorage.setItem(key, JSON.stringify(arr));
      },
      getItems: (key) => JSON.parse(localStorage.getItem(key) || '[]')
    };

      </div><div id="saberesContainer"></div>
      <p>Saberes seleccionados: <span id="contador">0</span></p></div>`;
      container.innerHTML = html;
      actualizarModulos();
      document.getElementById('nivelSelect').addEventListener('change', (e) => { selectedNivel = e.target.value; actualizarModulos(); guardarProgreso(); });
      document.getElementById('areaFiltro').addEventListener('change', cargarSaberes);
    }
    function actualizarModulos() {
      const modSelect = document.getElementById('moduloSelect');
      const modulos = Object.keys(DATA[selectedNivel] || {});
      if (!modulos.includes(selectedModulo)) selectedModulo = modulos[0];
      modSelect.innerHTML = modulos.map(m => `<option ${m===selectedModulo?'selected':''}>${m}</option>`).join('');
      cargarSaberes();
      modSelect.addEventListener('change', (e) => { selectedModulo = e.target.value; guardarProgreso(); cargarSaberes(); });
    }
    function cargarSaberes() {
      const data = DATA[selectedNivel]?.[selectedModulo] || {};
      const filtro = document.getElementById('areaFiltro')?.value || 'todas';
      let html = '';
      for (let area in data) {
        if (filtro !== 'todas' && filtro !== area) continue;
        html += `<div style="margin-top:15px;"><strong>${area}</strong> <button style="margin-left:10px;" onclick="seleccionarArea('${area}')">Seleccionar área</button></div>`;
        data[area].saberes.forEach(s => {
          const selected = saberesSeleccionados.has(s.id) ? 'selected' : '';
          html += `<span class="saber-tag ${selected}" onclick="toggleSaber('${s.id}')">${s.nombre}</span>`;
        });
      }
      document.getElementById('saberesContainer').innerHTML = html;
      document.getElementById('contador').innerText = saberesSeleccionados.size;
    }

    function obtenerSaberesDetallados(ids) {
      const detalles = [];
      for (let nivel in DATA)
        for (let mod in DATA[nivel])
          for (let area in DATA[nivel][mod])
            DATA[nivel][mod][area].saberes.forEach(s => { if (ids.includes(s.id)) detalles.push(`- ${s.nombre}: ${s.indicadores.join(' ')}`); });
      return detalles.join('\n');
    }

    // ---------- IA ----------
    function renderIA(container) {
      if (!currentUser) { container.innerHTML = '<div class="card">Inicia sesión</div>'; return; }
      const metodologiaSugerida = sugerirMetodologia(selectedNivel);
      container.innerHTML = `
        <div class="card"><h2>✨ Generar estrategia</h2>
          <div id="iaMensaje" class="info-message" style="display:none;"></div>
          <p>Saberes seleccionados: ${saberesSeleccionados.size}</p>
          <div class="flex-row">
            <select id="metodologia">
              <option value="ABJ" ${metodologiaSugerida==='ABJ'?'selected':''}>ABJ (Juegos)</option>
              <option value="ABR" ${metodologiaSugerida==='ABR'?'selected':''}>ABR (Retos)</option>
              <option value="Design Thinking" ${metodologiaSugerida==='Design Thinking'?'selected':''}>Design Thinking</option>
            </select>
            <select id="contexto"><option>Con tecnología</option><option>Sin tecnología</option></select>
            <select id="iaProvider"><option value="simulado">Simulación</option><option value="gemini">Gemini</option></select>
            <button onclick="generarEstrategia()">Generar</button>
            <button onclick="exportarTXT()">TXT</button>
            <button onclick="exportarHTML()">HTML</button>
            <button onclick="exportarWord()">Word</button>
            <button onclick="copiarResultado()">Copiar</button>
          </div>
          <div id="resultadoEstrategia" class="resultado-box"></div>
        </div>`;
    }
    window.generarEstrategia = async () => {
      if (saberesSeleccionados.size === 0) {
        document.getElementById('iaMensaje').innerHTML = '⚠️ Selecciona al menos un saber para generar la estrategia.';
        document.getElementById('iaMensaje').style.display = 'block';
        return;
      }
      document.getElementById('iaMensaje').style.display = 'none';
      const resultadoDiv = document.getElementById('resultadoEstrategia');
      resultadoDiv.innerText = '⏳ Generando estrategia con IA...';
      
      const provider = document.getElementById('iaProvider').value;
      const metodologia = document.getElementById('metodologia').value;
      const contexto = document.getElementById('contexto').value;
      const saberesIds = Array.from(saberesSeleccionados);
      let respuesta = '';
      
      if (provider === 'simulado') {
        respuesta = `🧪 Estrategia simulada (${metodologia})\n\nFocalización: ...\nExploración: ...\nAplicación: ...\nReflexión: ...`;
      } else {
        const apiKey = prompt(`API Key ${provider}:`);
        if (!apiKey) { resultadoDiv.innerText = ''; return; }
        const prompt = crearPrompt(metodologia, contexto, saberesIds);
        try { respuesta = await llamarAPI(provider, apiKey, prompt); }
        catch(e) { respuesta = 'Error de conexión con la API.'; }
      }
      resultadoDiv.innerText = respuesta;
      Storage.saveItem('pnft_estrategias', { nivel: selectedNivel, metodologia, provider, respuesta, saberes: saberesIds });
    };
    function crearPrompt(metodologia, contexto, saberesIds) {
      const ciclo = obtenerCiclo(selectedNivel);
      const rda = RDA[ciclo]?.['Apropiación tecnológica y Digital'] || '';
      const detalle = obtenerSaberesDetallados(saberesIds);
      return `Eres especialista MEP Costa Rica - PNFT 2026.
Contexto: ${contexto}. Nivel: ${selectedNivel}. Metodología: ${metodologia}.
Saberes:\n${detalle}\nRdA: ${rda}

Diseña una estrategia didáctica completa que incluya:
1. Título motivador.
2. Propósito.
3. Momentos pedagógicos (Focalización, Exploración, Aplicación, Reflexión) con actividades concretas y tiempos.
4. Ejemplo real contextualizado en Costa Rica.
5. Recursos necesarios.
6. Rúbrica analítica (Inicial, Intermedio, Avanzado).
7. Recomendaciones DUA (Representación, Acción/Expresión, Motivación).
8. Justificación alineada al PNFT.
9. Evidencias de aprendizaje observables.
10. Indicadores de logro vinculados explícitamente.`;
    }
    async function llamarAPI(provider, apiKey, prompt) {
      if (provider === 'gemini') {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
          method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });
        const data = await res.json();
        return data.candidates?.[0]?.content?.parts?.[0]?.text || 'Sin respuesta';
      }
      return `[Simulación] Estrategia generada con éxito.`;
    }
    function obtenerCiclo(n) { if(n==='0°')return'Preescolar'; const g=parseInt(n); if(g<=3)return'I Ciclo'; if(g<=6)return'II Ciclo'; return'III Ciclo'; }
    window.exportarTXT = () => { const c=document.getElementById('resultadoEstrategia')?.innerText||''; const b=new Blob([c]); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='estrategia.txt'; a.click(); };
    window.exportarHTML = () => { const c=document.getElementById('resultadoEstrategia')?.innerText||''; const w=window.open(); w.document.write(`<pre>${c}</pre>`); w.print(); };
    window.exportarWord = () => {
      const c=document.getElementById('resultadoEstrategia')?.innerText||'';
      const html = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word'><body>${c.replace(/\n/g,'<br>')}</body></html>`;
      const b=new Blob(['\ufeff',html],{type:'application/msword'});
      const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='estrategia.doc'; a.click();
    };
    window.copiarResultado = () => {
      const c=document.getElementById('resultadoEstrategia')?.innerText;
      if(c) navigator.clipboard.writeText(c).then(()=>alert('Copiado al portapapeles'));
    };

    // ---------- DASHBOARD ----------
    function renderDashboard(container) {
      const data = DATA[selectedNivel]?.[selectedModulo] || {};
      let totalSaberes=0, seleccionados=saberesSeleccionados.size, htmlAreas='';
      for (let area in data) {
        const total=data[area].saberes.length, sel=data[area].saberes.filter(s=>saberesSeleccionados.has(s.id)).length;
        totalSaberes+=total;
        htmlAreas+=`<div><p>${area} (${sel}/${total})</p><div class="progress-bar"><div class="progress-fill" style="width:${(sel/total)*100}%"></div></div></div>`;
      }
      const pct=totalSaberes?Math.round((seleccionados/totalSaberes)*100):0;
      container.innerHTML=`<div class="card"><h2>Progreso</h2><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div><p>${pct}% (${seleccionados}/${totalSaberes})</p>${htmlAreas}</div>`;
    }

    // ---------- EVALUACIÓN MEP ----------
    function renderEvaluacion(container) {
      const ciclo=obtenerCiclo(selectedNivel).includes('I')?'I':(obtenerCiclo(selectedNivel).includes('II')?'II':'III');
      container.innerHTML=`<div class="card"><h2>Evaluación ${ciclo} Ciclo</h2><div class="flex-row">
        <label>TC(1-4):<input id="tc" type="number" min="1" max="4" step="0.1" value="3"></label>
        <label>Tareas:<input id="tareas" type="number" value="80"></label>
        ${ciclo==='III'?'<label>Proyecto:<input id="proy" value="85"></label>':'<label>Pruebas:<input id="pruebas" value="75"></label>'}
        <label>Asistencia:<input id="asis" value="100"></label>
        <button onclick="calcularNota()">Calcular</button>
      </div><h3>Nota: <span id="notaFinal">-</span></h3></div>`;
    }
    window.calcularNota = () => {
      const ciclo=obtenerCiclo(selectedNivel).includes('I')?'I':(obtenerCiclo(selectedNivel).includes('II')?'II':'III');
      const p=PESOS[ciclo];
      const tc=(((parseFloat(document.getElementById('tc')?.value)||3)-1)/3)*100;
      const t=parseFloat(document.getElementById('tareas')?.value)||0;
      const pr=ciclo==='III'?0:(parseFloat(document.getElementById('pruebas')?.value)||0);
      const py=ciclo==='III'?(parseFloat(document.getElementById('proy')?.value)||0):0;
      const a=parseFloat(document.getElementById('asis')?.value)||100;
      let nota=0,peso=0;
      if(p.trabajoCotidiano){nota+=tc*p.trabajoCotidiano;peso+=p.trabajoCotidiano;}
      if(p.tareas){nota+=t*p.tareas;peso+=p.tareas;}
      if(p.pruebas){nota+=pr*p.pruebas;peso+=p.pruebas;}
      if(p.proyecto){nota+=py*p.proyecto;peso+=p.proyecto;}
      if(p.asistencia){nota+=a*p.asistencia;peso+=p.asistencia;}
      const final = (nota/peso).toFixed(2);
      document.getElementById('notaFinal').innerText = final;
      Storage.saveItem('pnft_evaluaciones', { 
        nivel: selectedNivel, ciclo, notaFinal: final, saberes: Array.from(saberesSeleccionados),
        componentes: {tc: tc.toFixed(1), tareas: t, pruebas: pr, proyecto: py, asistencia: a}
      });
    };

    // ---------- HISTORIAL ----------
    function renderHistorial(container) {
      const est=Storage.getItems('pnft_estrategias'), eva=Storage.getItems('pnft_evaluaciones');
      container.innerHTML=`<div class="card"><h2>Estrategias recientes</h2>${est.slice(-3).reverse().map(e=>`<p>${e.fecha?.slice(0,10)} - ${e.nivel} (${e.metodologia})</p>`).join('')}<h2>Evaluaciones recientes</h2>${eva.slice(-3).reverse().map(v=>`<p>${v.fecha?.slice(0,10)} - Nota ${v.notaFinal}</p>`).join('')}</div>`;
    }

    // ---------- INICIO ----------
    (async () => {
      await cargarProgreso();
      renderAuth();
      loadPage('curriculo');
    })();
  </script>
</body>
</html>
